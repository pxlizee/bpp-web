<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk - PT BPP</title>
    <link rel="icon" href="./assets/logo-2.png" type="image/png">


    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap"
        rel="stylesheet">

    <link href="./dist/output.css" rel="stylesheet">

    <style>
        body,
        h1,
        h2,
        h3,
        .font-poppins {
            font-family: 'Inter', sans-serif;
        }

        /* Menggunakan font Poppins agar tebal dan tegas */
        h1,
        h2,
        .font-elegant {
            font-family: 'Poppins', sans-serif;
        }

        /* Sembunyikan scrollbar di menu filter HP */
        .hide-scroll::-webkit-scrollbar {
            display: none;
        }

        .hide-scroll {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Efek Hover Gambar */
        .img-wrapper {
            overflow: hidden;
            border-radius: 1rem;
            background-color: #f3f4f6;
        }

        .img-wrapper img {
            transition: transform 0.7s ease;
        }

        .product-card:hover .img-wrapper img {
            transform: scale(1.05);
        }
    </style>
</head>

<body class="flex flex-col min-h-screen">

    <!-- Scroll Progress Indicator -->
    <div
        class="scroll-progress-indicator fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-bpp-blue to-bpp-gold-500 origin-left z-[100] pointer-events-none">
    </div>

    <!-- Navbar dengan logo -->
    <div id="navbar" class="fixed top-0 left-0 right-0 z-50 md:top-4 mx-auto w-full md:w-[90%] md:max-w-7xl md:rounded-2xl transition-all duration-500 glass border-b md:border border-white/20 p-4 shadow-md bg-white/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-2 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 group">
                <img src="./assets/logo-2.png" alt="Logo BPP" class="h-8 w-auto transition-transform duration-500 group-hover:scale-105">
            </a>
            <a href="index.html"
                class="text-sm font-semibold text-gray-600 hover:text-bpp-blue-800 transition flex items-center gap-1 bg-gray-50 hover:bg-gray-100 px-4 py-2 rounded-lg border border-gray-200 shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Kembali ke Beranda
            </a>
        </div>
    </div>

    <!-- Header section dengan gradien -->
    <div class="relative bg-bpp-blue-900 text-white overflow-hidden pt-36 md:pt-44 pb-16 md:pb-24">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1581094288338-2314dddb7ecc?q=80&w=2070')] bg-cover bg-center opacity-10"></div>
        <div class="relative max-w-7xl mx-auto px-4 sm:px-6 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4 drop-shadow-sm text-gradient-gold bg-gradient-to-r from-yellow-300 to-amber-400">Katalog <span class="text-white">Produk BPP</span></h1>
            <p class="text-lg md:text-xl text-bpp-blue-100 max-w-2xl mx-auto font-medium">Penyedia berbagai macam bahan bangunan, produk besi, baja, perpipaan, IPAL, dan material sipil berkualitas.</p>
        </div>
    </div>

    <!-- Custom Loading Animation Screen -->
    <div id="loading"
        class="fixed inset-0 bg-white/95 backdrop-blur-sm z-40 flex flex-col items-center justify-center transition-opacity duration-500">
        <img src="./assets/logo-1.png" class="h-16 w-auto animate-pulse mb-6" alt="Logo">
        <div class="h-1 w-32 bg-gray-100 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-bpp-blue to-bpp-gold w-1/2 rounded-full"
                style="animation: loading-bar 1.5s infinite ease-in-out;"></div>
        </div>
        <style>
            @keyframes loading-bar {
                0% {
                    transform: translateX(-100%);
                }

                50% {
                    transform: translateX(100%);
                }

                100% {
                    transform: translateX(-100%);
                }
            }
        </style>
        <p class="text-xs text-gray-400 font-extrabold tracking-widest uppercase mt-4">Memuat Katalog...</p>
    </div>

    <main id="konten-katalog" class="flex-grow py-12 md:py-16 max-w-7xl w-full mx-auto px-4 sm:px-6 hidden">

        <div class="mb-10">
            <div class="flex space-x-6 md:space-x-10 border-b border-gray-200 overflow-x-auto hide-scroll text-sm md:text-base whitespace-nowrap pb-1"
                id="wadah-filter">
                <button onclick="filterKategori('Semua', this)"
                    class="filter-btn pb-3 border-b-2 border-bpp-blue-900 text-bpp-blue-900 font-bold transition">Semua
                    Produk</button>
                <button onclick="filterKategori('Besi & Baja', this)"
                    class="filter-btn pb-3 border-b-2 border-transparent text-gray-400 font-semibold hover:text-bpp-blue-900 transition">Besi
                    & Baja</button>
                <button onclick="filterKategori('Perpipaan', this)"
                    class="filter-btn pb-3 border-b-2 border-transparent text-gray-400 font-semibold hover:text-bpp-blue-900 transition">Perpipaan</button>
                <button onclick="filterKategori('Instalasi IPAL', this)"
                    class="filter-btn pb-3 border-b-2 border-transparent text-gray-400 font-semibold hover:text-bpp-blue-900 transition">Instalasi
                    IPAL</button>
                <button onclick="filterKategori('Material Sipil', this)"
                    class="filter-btn pb-3 border-b-2 border-transparent text-gray-400 font-semibold hover:text-bpp-blue-900 transition">Material
                    Sipil</button>
                <button onclick="filterKategori('MEP', this)"
                    class="filter-btn pb-3 border-b-2 border-transparent text-gray-400 font-semibold hover:text-bpp-blue-900 transition">MEP</button>
            </div>

            <div class="flex justify-between items-center mt-6 text-sm font-medium text-gray-500">
                <span id="txt-total-produk" class="font-bold text-gray-700">0 Produk</span>
                <div class="flex items-center gap-2 cursor-pointer hover:text-bpp-blue-900 transition">
                    <span>Urutkan: Terbaru</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
            </div>
        </div>

        <div id="grid-produk"
            class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-4 gap-y-10 md:gap-x-8 md:gap-y-12">
        </div>

    </main>

    <footer class="bg-white border-t border-gray-100 py-10 mt-auto">
        <div class="max-w-[1200px] mx-auto px-6 md:px-12 text-center md:text-left text-xs font-medium text-gray-400">
            © 2026 PT Bojongkokosan Putra Perkasa.
        </div>
    </footer>

    <script type="module">
        import { collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { db } from "./src/firebase-config.js";
        let semuaProdukDatabase = [];

        async function loadProduk() {
            try {
                const q = query(collection(db, "produk"), orderBy("tanggalDitambahkan", "desc"));
                const querySnapshot = await getDocs(q);

                querySnapshot.forEach((doc) => {
                    semuaProdukDatabase.push({ id: doc.id, ...doc.data() });
                });

                renderProduk(semuaProdukDatabase);

                document.getElementById('loading').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('konten-katalog').classList.remove('hidden');
                }, 500);

            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = '<p class="text-red-500 font-bold">Gagal memuat katalog jaringan.</p>';
            }
        }

        function renderProduk(dataProduk) {
            const wadahGrid = document.getElementById('grid-produk');
            const txtTotal = document.getElementById('txt-total-produk');

            wadahGrid.innerHTML = '';
            txtTotal.innerText = `${dataProduk.length} Produk`;

            if (dataProduk.length === 0) {
                wadahGrid.innerHTML = '<p class="col-span-full text-center text-gray-500 font-medium py-10">Tidak ada produk di kategori ini.</p>';
                return;
            }

            dataProduk.forEach((item, index) => {
                const gambarSampul = (item.gambar && item.gambar.length > 0) ? item.gambar[0] : '';

                let labelHtml = item.label ? `<span class="absolute top-3 left-3 bg-white/95 backdrop-blur text-bpp-blue-900 text-[9px] md:text-[10px] font-extrabold px-2.5 py-1 rounded shadow-sm uppercase tracking-widest z-10 border border-gray-100">${item.label}</span>` : '';

                // Stagger transition effect added
                const htmlKartu = `
                    <a href="detail.html?id=${item.id}" class="product-card group block cursor-pointer animate-fade-slide-up" style="animation-delay: ${(index % 8) * 80}ms">
                        <div class="relative w-full aspect-[4/5] img-wrapper mb-4 border border-gray-100 shadow-sm transition-premium rounded-2xl overflow-hidden hover:shadow-lg">
                            ${labelHtml}
                            <img src="${gambarSampul}" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="${item.nama}">
                        </div>
                        
                        <div class="px-1 flex flex-col">
                            <span class="text-[10px] text-bpp-blue-600 font-bold uppercase tracking-wider mb-1">${item.kategori}</span>
                            <h3 class="text-sm md:text-base font-bold text-gray-900 leading-snug truncate font-elegant group-hover:text-bpp-blue-700 transition-colors">${item.nama}</h3>
                            <span class="text-xs font-semibold text-gray-400 mt-2 flex items-center group-hover:text-bpp-blue-700 transition-colors">
                                Lihat Detail 
                                <svg class="w-3 h-3 ml-1 transform group-hover:translate-x-1.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                            </span>
                        </div>
                    </a>
                `;
                wadahGrid.innerHTML += htmlKartu;
            });
        }

        window.filterKategori = function (kategori, elemenTombol) {
            const semuaTombol = document.querySelectorAll('.filter-btn');
            semuaTombol.forEach(btn => {
                btn.classList.remove('border-bpp-blue-900', 'text-bpp-blue-900', 'font-bold');
                btn.classList.add('border-transparent', 'text-gray-400', 'font-semibold');
            });

            elemenTombol.classList.remove('border-transparent', 'text-gray-400', 'font-semibold');
            elemenTombol.classList.add('border-bpp-blue-900', 'text-bpp-blue-900', 'font-bold');

            if (kategori === 'Semua') {
                renderProduk(semuaProdukDatabase);
            } else {
                const dataTersaring = semuaProdukDatabase.filter(item => item.kategori === kategori);
                renderProduk(dataTersaring);
            }
        }

        loadProduk();

        // Navbar dynamic styling on scroll
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('shadow-lg', 'md:top-2');
                navbar.classList.remove('md:top-4');
            } else {
                navbar.classList.remove('shadow-lg', 'md:top-2');
                navbar.classList.add('md:top-4');
            }
        });

        // Scroll progress bar JS fallback for browsers lacking animation-timeline support
        if (!CSS.supports('animation-timeline', 'scroll()')) {
            const progressBar = document.querySelector('.scroll-progress-indicator');
            if (progressBar) {
                progressBar.style.transform = 'scaleX(0)';
                window.addEventListener('scroll', () => {
                    const scrollHeight = document.documentElement.scrollHeight - window.innerHeight;
                    if (scrollHeight > 0) {
                        const scrollPercent = (window.scrollY / scrollHeight);
                        progressBar.style.transform = `scaleX(${scrollPercent})`;
                    }
                });
            }
        }
    </script>
</body>

</html>
