<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Artikel & Berita | BPP</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .artikel-card {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }
        
        .card-hover {
            transition: all 0.35s cubic-bezier(0.2, 0, 0, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.25);
        }
        
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
        }
        
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e3a8a;
            border-radius: 10px;
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .prose {
            max-width: 100%;
            line-height: 1.7;
        }
        .prose p {
            margin-bottom: 1em;
        }
        .prose img {
            max-width: 100%;
            border-radius: 0.5rem;
            margin: 1rem 0;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navbar dengan logo (sesuaikan path logo Anda) -->
    <div class="sticky top-0 z-20 bg-white/80 backdrop-blur-md border-b border-gray-200/50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <!-- Ganti dengan path logo Anda -->
                <img src="./assets/logo-2.png" alt="BPP Logo" class="h-10 w-auto">
            </a>
            <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-blue-800 transition flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Kembali ke Beranda
            </a>
        </div>
    </div>

    <!-- Header -->
    <div class="relative bg-blue-900 text-white overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1457364887197-9150188c107b?q=80&w=2070')] bg-cover bg-center opacity-10"></div>
        <div class="relative max-w-7xl mx-auto px-4 sm:px-6 py-16 md:py-24 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4 drop-shadow-sm">Artikel & <span class="text-amber-300">Berita</span></h1>
            <p class="text-lg md:text-xl text-blue-100 max-w-2xl mx-auto">Wawasan, tips, dan informasi terbaru seputar konstruksi & material dari PT Bojongkokosan Putra Perkasa.</p>
        </div>
    </div>

    <!-- Grid Artikel -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-12 md:py-20">
        <div id="artikel-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10">
            <div class="col-span-full flex justify-center items-center py-20">
                <div class="animate-pulse flex flex-col items-center text-gray-500">
                    <svg class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m0 0l4 4m-4-4v4m0 13h4a2 2 0 002-2v-4m-4 0h4m-4-4v4m0-4h4"></path></svg>
                    <span>Memuat artikel terkini...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detail Artikel -->
    <div id="modal-detail" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop transition-all duration-300">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl transform transition-all duration-300 scale-95 opacity-0" id="modal-container">
            <div class="sticky top-0 bg-white/95 backdrop-blur-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                <h3 id="modal-judul" class="text-2xl font-bold text-blue-900">Artikel</h3>
                <button onclick="tutupModal()" class="text-gray-400 hover:text-gray-700 transition-all text-3xl leading-none">&times;</button>
            </div>
            <div id="modal-body" class="p-6"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrDcMu6L49CvOtWG4Y64RQweuKUrXbu-M",
            authDomain: "bpp-produk.firebaseapp.com",
            projectId: "bpp-produk",
            storageBucket: "bpp-produk.firebasestorage.app",
            messagingSenderId: "38435149459",
            appId: "1:38435149459:web:d487394a5886221a9adf66"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        function formatTanggal(timestamp) {
            if (!timestamp) return 'Tidak diketahui';
            const date = timestamp.toDate();
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function stripHtml(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            return div.textContent || div.innerText || '';
        }

        async function tampilkanArtikel() {
            const grid = document.getElementById('artikel-grid');
            grid.innerHTML = '<div class="col-span-full flex justify-center items-center py-20"><div class="animate-pulse flex flex-col items-center text-gray-500"><svg class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m0 0l4 4m-4-4v4m0 13h4a2 2 0 002-2v-4m-4 0h4m-4-4v4m0-4h4"></path></svg><span>Memuat artikel...</span></div></div>';
            
            try {
                const q = query(collection(db, "artikel"), orderBy("tanggalDitambahkan", "desc"));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 text-lg bg-white/60 rounded-2xl p-10 backdrop-blur-sm">📭 Belum ada artikel. Silakan cek lagi nanti.</div>';
                    return;
                }

                grid.innerHTML = '';
                let index = 0;
                snapshot.forEach(doc => {
                    const a = doc.data();
                    const id = doc.id;
                    const cover = a.gambar_cover || 'https://placehold.co/600x400/1e3a8a/white?text=Artikel+BPP';
                    const tanggal = formatTanggal(a.tanggalDitambahkan);
                    
                    const card = document.createElement('div');
                    card.className = 'artikel-card rounded-2xl overflow-hidden bg-white shadow-lg border border-gray-100 card-hover';
                    card.style.animationDelay = `${index * 0.05}s`;
                    card.innerHTML = `
                        <div class="relative overflow-hidden group">
                            <img src="${cover}" class="w-full h-56 object-cover transition-transform duration-700 group-hover:scale-110" alt="${a.judul}">
                            <div class="absolute top-3 left-3">
                                <span class="bg-blue-900/80 backdrop-blur-sm text-white text-xs font-bold px-3 py-1 rounded-full">${a.kategori || 'Artikel'}</span>
                            </div>
                        </div>
                        <div class="p-5">
                            <div class="flex items-center gap-2 text-gray-500 text-xs mb-2">
                                <span>📅 ${tanggal}</span>
                                <span>✍️ ${a.penulis || 'Tim BPP'}</span>
                            </div>
                            <h3 class="text-xl font-bold text-gray-800 mb-2 line-clamp-2">${a.judul}</h3>
                            <p class="text-gray-600 text-sm line-clamp-3 mb-4">${stripHtml(a.isi || '')}</p>
                            <button onclick="bukaModal('${id}')" class="inline-flex items-center gap-2 text-blue-700 font-semibold text-sm border border-blue-200 rounded-full px-4 py-2 hover:bg-blue-700 hover:text-white hover:border-blue-700 transition-all duration-200">
                                Baca Selengkapnya <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                    index++;
                });

                window.artikelData = {};
                snapshot.forEach(doc => {
                    window.artikelData[doc.id] = doc.data();
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-500">⚠️ Gagal memuat artikel. Coba refresh halaman.</div>';
            }
        }

        window.bukaModal = (id) => {
            const artikel = window.artikelData[id];
            if (!artikel) return;

            document.getElementById('modal-judul').innerText = artikel.judul;
            const modalBody = document.getElementById('modal-body');
            
            const tanggal = formatTanggal(artikel.tanggalDitambahkan);
            
            modalBody.innerHTML = `
                <div class="mb-4">
                    <img src="${artikel.gambar_cover}" class="w-full rounded-xl object-cover max-h-80" alt="${artikel.judul}">
                </div>
                <div class="flex flex-wrap gap-3 text-sm text-gray-500 border-b pb-3 mb-4">
                    <span>📅 ${tanggal}</span>
                    <span>✍️ ${artikel.penulis || 'Tim BPP'}</span>
                    <span>🏷️ ${artikel.kategori || 'Umum'}</span>
                </div>
                <div class="prose max-w-none text-gray-700 leading-relaxed">
                    ${artikel.isi || '<p class="italic text-gray-400">Konten artikel tidak tersedia.</p>'}
                </div>
            `;

            const modal = document.getElementById('modal-detail');
            const modalContainer = document.getElementById('modal-container');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalContainer.classList.remove('scale-95', 'opacity-0');
                modalContainer.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.tutupModal = () => {
            const modal = document.getElementById('modal-detail');
            const modalContainer = document.getElementById('modal-container');
            modalContainer.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                modalContainer.classList.remove('scale-100', 'opacity-100');
            }, 200);
        };

        tampilkanArtikel();
    </script>
</body>
</html>
