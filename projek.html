<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Portofolio Projek | BPP</title>
    
    <!-- Google Fonts: Inter (semua weight) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS + custom layer -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom style tambahan -->
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
        }
        
        /* Animasi fade-in untuk card */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .projek-card {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0; /* awal invisible, nanti di JS di set style? lebih gampang via CSS delay? Kita set via CSS aja nanti */
        }
        
        /* Hover effect premium */
        .card-hover {
            transition: all 0.35s cubic-bezier(0.2, 0, 0, 1);
        }
        .card-hover:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.25);
        }
        
        /* Modal backdrop blur */
        .modal-backdrop {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(5px);
        }
        
        /* Scrollbar halus */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e3a8a;
            border-radius: 10px;
        }
        
        /* Untuk line-clamp (opsional) */
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Navbar minimalis dengan efek blur -->
    <div class="sticky top-0 z-20 bg-white/80 backdrop-blur-md border-b border-gray-200/50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <img src="./assets/logo-2.png" alt="Logo BPP" class="h-8 w-auto">
            </a>
            <a href="index.html" class="text-sm font-medium text-gray-600 hover:text-blue-800 transition flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                Kembali ke Beranda
            </a>
        </div>
    </div>

    <!-- Header section dengan gradien -->
    <div class="relative bg-blue-900 text-white overflow-hidden">
        <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1504917595217-d4dc5ebe6122?q=80&w=2070')] bg-cover bg-center opacity-10"></div>
        <div class="relative max-w-7xl mx-auto px-4 sm:px-6 py-16 md:py-24 text-center">
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4 drop-shadow-sm">Portofolio <span class="text-amber-300">Projek BPP</span></h1>
            <p class="text-lg md:text-xl text-blue-100 max-w-2xl mx-auto">Ragam konstruksi & infrastruktur yang telah menggunakan material berkualitas dari PT Bojongkokosan Putra Perkasa.</p>
            <div class="mt-6 flex justify-center gap-2">
                <span class="px-3 py-1 bg-white/20 rounded-full text-sm backdrop-blur-sm">🏆 10+ Tahun Pengalaman</span>
                <span class="px-3 py-1 bg-white/20 rounded-full text-sm backdrop-blur-sm">🔧 Material Bersertifikat</span>
            </div>
        </div>
    </div>

    <!-- Grid Projek -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-12 md:py-20">
        <div id="projek-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10">
            <div class="col-span-full flex justify-center items-center py-20">
                <div class="animate-pulse flex flex-col items-center text-gray-500">
                    <svg class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span>Memuat proyek terbaik...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Detail (Premium) -->
    <div id="modal-detail" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-backdrop transition-all duration-300">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl transform transition-all duration-300 scale-95 opacity-0" id="modal-container">
            <div class="sticky top-0 bg-white/95 backdrop-blur-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                <h3 id="modal-judul" class="text-2xl font-bold text-blue-900">Detail Projek</h3>
                <button onclick="tutupModal()" class="text-gray-400 hover:text-gray-700 transition-all text-3xl leading-none">&times;</button>
            </div>
            <div id="modal-body" class="p-6"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrDcMu6L49CvOtWG4Y64RQweuKUrXbu-M",
            authDomain: "bpp-produk.firebaseapp.com",
            projectId: "bpp-produk",
            storageBucket: "bpp-produk.firebasestorage.app",
            messagingSenderId: "38435149459",
            appId: "1:38435149459:web:d487394a5886221a9adf66"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function tampilkanProjek() {
            const grid = document.getElementById('projek-grid');
            grid.innerHTML = '<div class="col-span-full flex justify-center items-center py-20"><div class="animate-pulse flex flex-col items-center text-gray-500"><svg class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><span>Memuat proyek terbaik...</span></div></div>';
            
            try {
                const q = query(collection(db, "projek"), orderBy("tanggalDitambahkan", "desc"));
                const snapshot = await getDocs(q);
                
                if (snapshot.empty) {
                    grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 text-lg bg-white/60 rounded-2xl p-10 backdrop-blur-sm">✨ Belum ada portofolio projek. Segera hadir! ✨</div>';
                    return;
                }

                grid.innerHTML = '';
                let index = 0;
                snapshot.forEach(doc => {
                    const p = doc.data();
                    const id = doc.id;
                    const cover = (p.gambar && p.gambar.length > 0) ? p.gambar[0] : 'https://placehold.co/600x400/1e3a8a/white?text=Projek+BPP';
                    
                    const card = document.createElement('div');
                    card.className = 'projek-card rounded-2xl overflow-hidden bg-white shadow-lg border border-gray-100 card-hover';
                    card.style.animationDelay = `${index * 0.05}s`;
                    card.innerHTML = `
                        <div class="relative overflow-hidden group">
                            <img src="${cover}" class="w-full h-64 object-cover transition-transform duration-700 group-hover:scale-110" alt="${p.judul}">
                            <div class="absolute top-3 left-3 flex gap-2">
                                <span class="bg-blue-900/80 backdrop-blur-sm text-white text-xs font-bold px-3 py-1 rounded-full">${p.kategori || 'Projek'}</span>
                            </div>
                            <div class="absolute bottom-3 right-3 bg-black/50 backdrop-blur-sm text-white text-xs px-2 py-1 rounded-full">${p.tahun || ''}</div>
                        </div>
                        <div class="p-5">
                            <h3 class="text-xl font-bold text-gray-800 mb-1 line-clamp-1">${p.judul}</h3>
                            <div class="flex items-center gap-2 text-gray-500 text-sm mb-3">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                <span>${p.klien || 'Klien umum'}</span>
                            </div>
                            <p class="text-gray-600 text-sm line-clamp-3 mb-4">${stripHtml(p.deskripsi || '')}</p>
                            <button onclick="bukaModal('${id}')" class="inline-flex items-center gap-2 text-blue-700 font-semibold text-sm border border-blue-200 rounded-full px-4 py-2 hover:bg-blue-700 hover:text-white hover:border-blue-700 transition-all duration-200">
                                Eksplorasi <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                    index++;
                });

                // Simpan data projek ke global
                window.projekData = {};
                snapshot.forEach(doc => {
                    window.projekData[doc.id] = doc.data();
                });

            } catch (error) {
                console.error(error);
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-red-500">⚠️ Gagal memuat data. Coba refresh halaman.</div>';
            }
        }

        function stripHtml(html) {
            const div = document.createElement('div');
            div.innerHTML = html;
            return div.textContent || div.innerText || '';
        }

        window.bukaModal = (id) => {
            const projek = window.projekData[id];
            if (!projek) return;

            document.getElementById('modal-judul').innerText = projek.judul;
            const modalBody = document.getElementById('modal-body');
            
            let galeriHtml = '';
            if (projek.gambar && projek.gambar.length) {
                galeriHtml = `
                    <div class="mb-6">
                        <h4 class="font-semibold text-gray-800 mb-2">📸 Galeri Projek</h4>
                        <div class="flex gap-3 overflow-x-auto pb-2">
                            ${projek.gambar.map(url => `<img src="${url}" class="h-28 w-auto rounded-lg object-cover shadow-md hover:scale-105 transition" alt="gambar">`).join('')}
                        </div>
                    </div>
                `;
            }

            modalBody.innerHTML = `
                ${galeriHtml}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm bg-gray-50 p-4 rounded-xl mb-6">
                    <div><span class="font-bold text-gray-700">🏷️ Kategori</span><br>${projek.kategori || '-'}</div>
                    <div><span class="font-bold text-gray-700">📅 Tahun</span><br>${projek.tahun || '-'}</div>
                    <div class="md:col-span-2"><span class="font-bold text-gray-700">🤝 Klien / Kontraktor</span><br>${projek.klien || '-'}</div>
                </div>
                <div class="prose max-w-none text-gray-700 leading-relaxed">
                    ${projek.deskripsi || '<p class="italic text-gray-400">Deskripsi lengkap belum tersedia.</p>'}
                </div>
            `;

            const modal = document.getElementById('modal-detail');
            const modalContainer = document.getElementById('modal-container');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalContainer.classList.remove('scale-95', 'opacity-0');
                modalContainer.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.tutupModal = () => {
            const modal = document.getElementById('modal-detail');
            const modalContainer = document.getElementById('modal-container');
            modalContainer.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                modalContainer.classList.remove('scale-100', 'opacity-100');
            }, 200);
        };

        tampilkanProjek();
    </script>
</body>
</html>
