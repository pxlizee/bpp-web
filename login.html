<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - PT BPP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-900 mb-2">Portal Admin BPP</h1>
            <p class="text-sm text-gray-500">Silakan login untuk mengelola website.</p>
        </div>

        <form id="form-login" class="space-y-5">
            <div>
                <label class="block mb-1 text-sm font-semibold text-gray-900">Email Admin</label>
                <input type="email" id="email" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg w-full p-3" required>
            </div>
            <div>
                <label class="block mb-1 text-sm font-semibold text-gray-900">Password</label>
                <input type="password" id="password" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg w-full p-3" required>
            </div>
            
            <p id="pesan-error" class="text-red-500 text-xs font-bold hidden">Email atau Password salah!</p>

            <button type="submit" id="btn-login" class="w-full text-white bg-blue-900 hover:bg-blue-800 font-bold rounded-lg text-sm px-5 py-3 transition">
                Masuk ke Dashboard
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // GANTI CONFIG INI
        const firebaseConfig = {
            apiKey: "AIzaSyCrDcMu6L49CvOtWG4Y64RQweuKUrXbu-M",
            authDomain: "bpp-produk.firebaseapp.com",
            projectId: "bpp-produk",
            storageBucket: "bpp-produk.firebasestorage.app",
            messagingSenderId: "38435149459",
            appId: "1:38435149459:web:d487394a5886221a9adf66"
         };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById('form-login');
        const btnLogin = document.getElementById('btn-login');
        const pesanError = document.getElementById('pesan-error');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            btnLogin.innerHTML = "Mengecek...";
            pesanError.classList.add('hidden');

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                window.location.href = "admin.html";
            })
            .catch((error) => {
                btnLogin.innerHTML = "Masuk ke Dashboard";
                // INI YANG DIUBAH: Tampilkan pesan asli dari Firebase
                pesanError.innerText = "Error Firebase: " + error.message; 
                pesanError.classList.remove('hidden');
                console.error(error.code, error.message);
            });
        });
    </script>
</body>
</html>
