<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin BPP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.1/flowbite.min.css" rel="stylesheet">
    <link href="./dist/output.css" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .ql-container { font-family: 'Inter', sans-serif; font-size: 14px; background: #fff; border-bottom-left-radius: 0.5rem; border-bottom-right-radius: 0.5rem; }
        .ql-toolbar { background: #f9fafb; border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; }
        .ql-editor { min-height: 150px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 bg-white p-6 rounded-xl shadow-lg h-fit sticky top-8">
            <h2 id="judul-form" class="text-xl font-bold mb-4 text-blue-900 border-b pb-3">Tambah Produk Baru</h2>
            
            <div id="alert-sukses" class="hidden p-3 mb-4 text-sm text-green-800 rounded-lg bg-green-50" role="alert">
                <span class="font-bold">Berhasil!</span> Data tersimpan.
            </div>

            <form id="form-produk" class="space-y-4">
                <input type="hidden" id="input-id">

                <div>
                    <label class="block mb-1 text-sm font-medium text-gray-900">Nama Produk</label>
                    <input type="text" id="input-nama" class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 block w-full p-2.5" required>
                </div>
                <div>
                    <label class="block mb-1 text-sm font-medium text-gray-900">Kategori</label>
                    <select id="input-kategori" class="bg-gray-50 border border-gray-300 text-sm rounded-lg focus:ring-blue-500 block w-full p-2.5" required>
                        <option value="Besi & Baja">Besi & Baja</option>
                        <option value="Perpipaan">Perpipaan</option>
                        <option value="Instalasi IPAL">Instalasi IPAL</option>
                        <option value="Material Sipil">Material Sipil</option>
                    </select>
                </div>
                
                <div>
                    <label class="block mb-1 text-sm font-medium text-gray-900">Deskripsi Lengkap</label>
                    <div id="editor-deskripsi"></div>
                </div>
                
                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100">
                    <label class="block mb-1 text-sm font-bold text-blue-900">Link URL Gambar</label>
                    <p class="text-[10px] text-gray-500 mb-2">Pisahkan dengan koma ( , ) jika lebih dari 1.</p>
                    <textarea id="input-gambar" rows="2" class="bg-white border border-gray-300 text-sm rounded-lg w-full p-2.5" required></textarea>
                </div>

                <div>
                    <label class="block mb-1 text-sm font-medium text-gray-900">Label (Misal: PROMO)</label>
                    <input type="text" id="input-label" class="bg-gray-50 border border-gray-300 text-sm rounded-lg w-full p-2.5">
                </div>
                
                <div class="flex gap-2 pt-2">
                    <button type="submit" id="btn-simpan" class="w-full text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-5 py-2.5 transition">Simpan Produk</button>
                    <button type="button" id="btn-batal" class="hidden w-full text-gray-700 bg-gray-200 hover:bg-gray-300 font-medium rounded-lg text-sm px-5 py-2.5 transition">Batal Edit</button>
                </div>
            </form>
        </div>

        <div class="lg:col-span-7 bg-white p-6 rounded-xl shadow-lg">
            <h2 class="text-xl font-bold mb-4 text-gray-900 border-b pb-3 flex justify-between items-center">
                Daftar Katalog Anda
                <span id="total-produk" class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded-full">0 Produk</span>
            </h2>
            
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-500">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50">
                        <tr>
                            <th scope="col" class="px-4 py-3">Produk</th>
                            <th scope="col" class="px-4 py-3">Kategori</th>
                            <th scope="col" class="px-4 py-3 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-produk" class="divide-y divide-gray-200">
                        <tr>
                            <td colspan="3" class="px-4 py-8 text-center text-gray-500">Memuat data database...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor-deskripsi', {
            theme: 'snow',
            placeholder: 'Ketik deskripsi produk di sini...',
            modules: { toolbar: [['bold', 'italic', 'underline'], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean']] }
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ==========================================
        // GANTI CONFIG FIREBASE ANDA DI SINI
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCrDcMu6L49CvOtWG4Y64RQweuKUrXbu-M",
            authDomain: "bpp-produk.firebaseapp.com",
            projectId: "bpp-produk",
            storageBucket: "bpp-produk.firebasestorage.app",
            messagingSenderId: "38435149459",
            appId: "1:38435149459:web:d487394a5886221a9adf66"
         };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Elemen HTML
        const form = document.getElementById('form-produk');
        const inputId = document.getElementById('input-id');
        const btnSimpan = document.getElementById('btn-simpan');
        const btnBatal = document.getElementById('btn-batal');
        const judulForm = document.getElementById('judul-form');
        const tabelProduk = document.getElementById('tabel-produk');
        
        // Simpan data mentah agar gampang saat mau edit
        let produkDatabase = []; 

        // ================= FUNGSI 1: TAMPILKAN TABEL =================
        async function loadTabelAdmin() {
            try {
                const q = query(collection(db, "produk"), orderBy("tanggalDitambahkan", "desc"));
                const querySnapshot = await getDocs(q);
                
                tabelProduk.innerHTML = '';
                produkDatabase = []; // Kosongkan array lokal
                
                let count = 0;

                querySnapshot.forEach((docSnap) => {
                    const item = docSnap.data();
                    const id = docSnap.id;
                    produkDatabase.push({ id, ...item }); // Simpan ke array lokal
                    count++;

                    const gambarKecil = (item.gambar && item.gambar.length > 0) ? item.gambar[0] : '';

                    tabelProduk.innerHTML += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="px-4 py-3 flex items-center gap-3">
                                <img src="${gambarKecil}" class="w-10 h-10 rounded object-cover border border-gray-200" alt="img">
                                <span class="font-bold text-gray-900 line-clamp-1">${item.nama}</span>
                            </td>
                            <td class="px-4 py-3 text-xs whitespace-nowrap">${item.kategori}</td>
                            <td class="px-4 py-3 text-right space-x-2 whitespace-nowrap">
                                <button onclick="klikEdit('${id}')" class="font-medium text-blue-600 hover:underline">Edit</button>
                                <button onclick="klikHapus('${id}', '${item.nama.replace(/'/g, "\\'")}')" class="font-medium text-red-600 hover:underline">Hapus</button>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('total-produk').innerText = `${count} Produk`;

                if(count === 0){
                    tabelProduk.innerHTML = '<tr><td colspan="3" class="px-4 py-8 text-center text-gray-500">Belum ada produk.</td></tr>';
                }

            } catch (error) {
                console.error(error);
                tabelProduk.innerHTML = '<tr><td colspan="3" class="px-4 py-8 text-center text-red-500">Gagal memuat data.</td></tr>';
            }
        }

        // ================= FUNGSI 2: TAMBAH / UPDATE (SUBMIT) =================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const htmlDeskripsi = quill.root.innerHTML;
            if (quill.getText().trim() === '') return alert("Deskripsi kosong!");

            btnSimpan.innerHTML = "Menyimpan...";
            btnSimpan.disabled = true;

            const gambarMentah = document.getElementById('input-gambar').value;
            const arrayGambar = gambarMentah.split(',').map(url => url.trim()).filter(url => url !== "");

            const dataSimpan = {
                nama: document.getElementById('input-nama').value,
                kategori: document.getElementById('input-kategori').value,
                deskripsi: htmlDeskripsi,
                gambar: arrayGambar,
                label: document.getElementById('input-label').value,
            };

            const editId = inputId.value;

            try {
                if (editId === "") {
                    // MODE TAMBAH BARU
                    dataSimpan.tanggalDitambahkan = new Date();
                    await addDoc(collection(db, "produk"), dataSimpan);
                } else {
                    // MODE UPDATE/EDIT
                    await updateDoc(doc(db, "produk", editId), dataSimpan);
                }

                resetForm();
                loadTabelAdmin(); // Refresh Tabel
                
                const alertEl = document.getElementById('alert-sukses');
                alertEl.classList.remove('hidden');
                setTimeout(() => alertEl.classList.add('hidden'), 3000);

            } catch (error) {
                console.error(error);
                alert("Gagal menyimpan ke database!");
            } finally {
                btnSimpan.innerHTML = "Simpan Produk";
                btnSimpan.disabled = false;
            }
        });

        // ================= FUNGSI 3: HAPUS =================
        window.klikHapus = async (id, nama) => {
            const yakin = confirm(`Apakah Anda yakin ingin MENGHAPUS secara permanen produk:\n"${nama}"?`);
            if(yakin) {
                try {
                    await deleteDoc(doc(db, "produk", id));
                    loadTabelAdmin(); // Refresh tabel setelah hapus
                } catch (error) {
                    alert("Gagal menghapus produk.");
                    console.error(error);
                }
            }
        };

        // ================= FUNGSI 4: EDIT (LEMPAR DATA KE FORM) =================
        window.klikEdit = (id) => {
            // Cari data produk di array lokal
            const item = produkDatabase.find(p => p.id === id);
            if(!item) return;

            // Masukkan data ke form
            inputId.value = item.id;
            document.getElementById('input-nama').value = item.nama;
            document.getElementById('input-kategori').value = item.kategori;
            document.getElementById('input-gambar').value = item.gambar.join(", ");
            document.getElementById('input-label').value = item.label || "";
            quill.root.innerHTML = item.deskripsi;

            // Ubah Tampilan Form jadi Mode Edit
            judulForm.innerText = "Edit Produk";
            judulForm.classList.replace('text-blue-900', 'text-yellow-600');
            btnSimpan.innerText = "Update Data Produk";
            btnSimpan.classList.replace('bg-blue-700', 'bg-yellow-500');
            btnSimpan.classList.replace('hover:bg-blue-800', 'hover:bg-yellow-600');
            btnBatal.classList.remove('hidden');

            // Scroll layar ke atas (ke arah form)
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // ================= FUNGSI 5: BATAL EDIT =================
        function resetForm() {
            form.reset();
            inputId.value = "";
            quill.root.innerHTML = "";
            
            judulForm.innerText = "Tambah Produk Baru";
            judulForm.classList.replace('text-yellow-600', 'text-blue-900');
            btnSimpan.innerText = "Simpan Produk";
            btnSimpan.classList.replace('bg-yellow-500', 'bg-blue-700');
            btnSimpan.classList.replace('hover:bg-yellow-600', 'hover:bg-blue-800');
            btnBatal.classList.add('hidden');
        }

        btnBatal.addEventListener('click', resetForm);

        // Jalankan saat halaman dibuka
        loadTabelAdmin();
    </script>
</body>
</html>
